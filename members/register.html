<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — NEXAutogear B2B Portal</title>
  <meta name="description" content="Register for a NEXAutogear business account to access wholesale pricing on wheels, tires, and TPMS sensors. Factory-direct from China, shipped worldwide." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://nexautogear.com/members/register.html" />
  <!-- Hreflang -->
  <link rel="alternate" hreflang="en" href="https://nexautogear.com/members/register.html" />
  <link rel="alternate" hreflang="es" href="https://nexautogear.com/es/members/register.html" />
  <!-- OG -->
  <meta property="og:title" content="Join NEXAutogear — B2B Wholesale Portal" />
  <meta property="og:description" content="Factory-direct wheels, tires & TPMS. Create your account to access pricing and place orders." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="../css/base.css" />
  <style>
    body { background: var(--bg); }

    .reg-layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 420px;
    }

    /* -- Left panel -- */
    .reg-left {
      background: linear-gradient(160deg, #0a0e18 0%, #0d1525 50%, #081425 100%);
      border-right: 1px solid var(--border);
      padding: calc(var(--nav-h) + 3rem) 4rem 3rem;
      display: flex; flex-direction: column; justify-content: center;
      position: sticky; top: 0; height: 100vh; overflow: hidden;
    }
    .reg-left-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,209,101,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,209,101,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .reg-left-glow {
      position: absolute; top: 20%; left: -80px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,100,180,0.12), transparent 70%);
      pointer-events: none;
    }
    .reg-left-content { position: relative; z-index: 1; }
    .reg-brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 900; margin-bottom: 2.5rem; }
    .reg-brand span { color: var(--accent); }
    .reg-headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.6rem, 2.5vw, 2.4rem); font-weight: 900; line-height: 1.1;
      margin-bottom: 1rem;
    }
    .reg-sub { color: var(--muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 2.5rem; max-width: 380px; }
    .reg-perks { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 3rem; }
    .reg-perk {
      display: flex; align-items: flex-start; gap: 0.85rem;
    }
    .reg-perk-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      background: rgba(255,209,101,0.08); border: 1px solid rgba(255,209,101,0.12);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .reg-perk-title { font-weight: 700; font-size: 0.875rem; margin-bottom: 0.15rem; }
    .reg-perk-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
    .reg-markets {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      padding-top: 1.5rem; border-top: 1px solid var(--border);
    }
    .market-flag {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 6px; font-size: 0.78rem; color: var(--muted);
    }

    /* -- Right panel (form) -- */
    .reg-right {
      background: var(--bg2);
      padding: calc(var(--nav-h) + 2rem) 2.5rem 2.5rem;
      overflow-y: auto; max-height: 100vh;
    }
    .reg-right-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.35rem; }
    .reg-right-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; }
    .reg-right-sub a { color: var(--accent); }

    /* -- Form sections -- */
    .form-section {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .form-section-title {
      font-size: 0.8rem; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .form-row { display: flex; gap: 0.75rem; }
    .form-row > * { flex: 1; }

    /* -- Business type cards -- */
    .btype-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .btype-card {
      border: 1px solid var(--border2); border-radius: 9px;
      padding: 0.75rem; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: flex-start; gap: 0.6rem;
    }
    .btype-card:hover { border-color: rgba(255,209,101,0.28); background: rgba(255,209,101,0.03); }
    .btype-card.selected { border-color: var(--accent); background: rgba(255,209,101,0.06); }
    .btype-card input { display: none; }
    .btype-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .btype-name { font-size: 0.8rem; font-weight: 700; }
    .btype-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }

    /* -- Market checkboxes -- */
    .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .market-check {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: all 0.2s; font-size: 0.82rem;
    }
    .market-check:hover { border-color: rgba(255,209,101,0.18); }
    .market-check input { accent-color: var(--accent); }
    .market-check.checked { border-color: rgba(255,209,101,0.28); background: rgba(255,209,101,0.04); }

    /* -- Products checkboxes -- */
    .product-check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .product-check {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: all 0.2s;
    }
    .product-check:hover { border-color: rgba(255,209,101,0.25); }
    .product-check input { accent-color: var(--accent); }
    .product-check.checked { border-color: var(--accent); background: rgba(255,209,101,0.05); }
    .product-check-icon { font-size: 1rem; }
    .product-check-name { font-size: 0.82rem; font-weight: 600; }

    /* -- Enterprise CTA -- */
    .enterprise-bar {
      background: linear-gradient(135deg, rgba(173,221,255,0.06), rgba(255,209,101,0.04));
      border: 1px solid rgba(173,221,255,0.15);
      border-radius: var(--radius); padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
    }
    .enterprise-bar-icon { font-size: 1.4rem; flex-shrink: 0; }
    .enterprise-bar-title { font-weight: 700; font-size: 0.875rem; margin-bottom: 0.15rem; }
    .enterprise-bar-desc { font-size: 0.78rem; color: var(--muted); }
    .enterprise-bar a { color: var(--blue); font-weight: 600; }

    /* -- Submit -- */
    .reg-submit-area { margin-top: 1.25rem; }
    .reg-terms { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.6; }
    .reg-terms a { color: var(--accent); }

    /* -- Social login -- */
    .social-login { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.25rem; }
    .social-btn-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border2);
      border-radius: 9px; cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: all 0.2s;
    }
    .social-btn-item:hover { background: rgba(255,255,255,0.07); border-color: var(--border2); }

    /* -- Progress bar -- */
    .reg-progress {
      height: 3px; background: var(--border);
      border-radius: 99px; margin-bottom: 1.75rem; overflow: hidden;
    }
    .reg-progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 99px; transition: width 0.4s ease;
    }

    @media (max-width: 900px) {
      .reg-layout { grid-template-columns: 1fr; }
      .reg-left { position: static; height: auto; padding: calc(var(--nav-h) + 2rem) 1.5rem 2rem; }
      .reg-right { padding: 2rem 1.5rem 3rem; max-height: none; }
    }
  </style>

</html>
