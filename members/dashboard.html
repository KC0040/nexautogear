<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — NEXAutogear Portal</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/base.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg); }

    /* -- Dashboard layout -- */
    .dash-wrap {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* -- Sidebar -- */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: sticky; top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
    }
    .sidebar-user {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: #000;
      margin-bottom: 0.65rem;
    }
    .user-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.1rem; }
    .user-company { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; }
    .user-status {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.72rem; font-weight: 600; color: var(--success);
    }

    .sidebar-nav { padding: 0.75rem 0.75rem; flex: 1; }
    .sidebar-section-label {
      font-size: 0.65rem; font-weight: 700; color: var(--muted2);
      text-transform: uppercase; letter-spacing: 0.12em;
      padding: 0.5rem 0.5rem 0.35rem;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.55rem 0.75rem;
      border-radius: 9px;
      font-size: 0.85rem; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: all 0.18s; margin-bottom: 0.1rem;
      border: none; background: none; width: 100%; text-align: left;
      text-decoration: none;
    }
    .sidebar-link:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .sidebar-link.active { background: rgba(255,209,101,0.1); color: var(--accent); }
    .sidebar-link-icon { width: 18px; text-align: center; font-size: 0.95rem; flex-shrink: 0; }
    .sidebar-badge {
      margin-left: auto;
      background: var(--danger); color: #fff;
      font-size: 0.65rem; font-weight: 700;
      padding: 0.1rem 0.45rem; border-radius: 99px;
    }
    .sidebar-badge.green { background: rgba(46,213,115,0.2); color: var(--success); }

    .sidebar-bottom {
      padding: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .chat-sales-btn {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.65rem 0.85rem;
      background: rgba(255,209,101,0.06);
      border: 1px solid rgba(255,209,101,0.12);
      border-radius: 10px;
      cursor: pointer; transition: all 0.2s; width: 100%;
      font-size: 0.82rem; font-weight: 600; color: var(--text);
    }
    .chat-sales-btn:hover { background: rgba(255,209,101,0.12); border-color: rgba(255,209,101,0.28); }

    /* -- Main content -- */
    .dash-main {
      flex: 1; padding: 2rem 2.5rem;
      overflow-x: hidden;
    }
    .dash-page { display: none; }
    .dash-page.active { display: block; }

    /* -- Page header -- */
    .page-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.75rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-hdr-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 900; }
    .page-hdr-sub { font-size: 0.85rem; color: var(--muted); margin-top: 0.2rem; }

    /* -- Stat cards -- */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1rem; margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .stat-card-label { font-size: 0.775rem; color: var(--muted); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem; }
    .stat-card-value { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 900; margin-bottom: 0.2rem; }
    .stat-card-sub { font-size: 0.75rem; color: var(--muted); }
    .stat-card-sub.up { color: var(--success); }
    .stat-card-sub.warn { color: var(--warning); }

    /* -- Two-col layout -- */
    .two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .one-col { margin-bottom: 1.25rem; }

    /* -- Panel -- */
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .panel-hdr {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.02);
    }
    .panel-title { font-weight: 700; font-size: 0.9rem; }
    .panel-body { padding: 1.1rem 1.25rem; }

    /* -- Order / Inquiry rows -- */
    .item-list { display: flex; flex-direction: column; }
    .item-row {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 0.775rem; color: var(--muted); }
    .item-right { text-align: right; flex-shrink: 0; }
    .item-value { font-weight: 700; font-size: 0.9rem; }
    .item-date { font-size: 0.75rem; color: var(--muted); }

    /* -- Status badges -- */
    .status {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.6rem; border-radius: 99px;
      font-size: 0.72rem; font-weight: 700;
    }
    .status-pending  { background: rgba(255,165,2,0.1); color: var(--warning); }
    .status-active   { background: rgba(46,213,115,0.1); color: var(--success); }
    .status-shipped  { background: rgba(255,209,101,0.1);  color: var(--accent); }
    .status-review   { background: rgba(173,221,255,0.08); color: var(--blue); }
    .status-closed   { background: rgba(255,255,255,0.05); color: var(--muted); }

    /* -- Sales team panel -- */
    .team-grid { display: flex; flex-direction: column; gap: 0.75rem; }
    .agent-card {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s;
    }
    .agent-card:hover { border-color: rgba(255,209,101,0.25); background: rgba(255,209,101,0.03); }
    .agent-av {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.9rem; color: #000;
      position: relative;
    }
    .agent-av::after {
      content: '';
      position: absolute; bottom: 0; right: 0;
      width: 11px; height: 11px; border-radius: 50%;
      border: 2px solid var(--card);
    }
    .agent-av.online::after { background: var(--success); }
    .agent-av.busy::after { background: var(--warning); }
    .agent-av.offline::after { background: var(--muted2); }
    .agent-info { flex: 1; }
    .agent-name { font-weight: 700; font-size: 0.875rem; }
    .agent-role { font-size: 0.75rem; color: var(--muted); }
    .agent-tag {
      font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .agent-status-text { font-size: 0.72rem; font-weight: 600; }
    .agent-status-text.online { color: var(--success); }
    .agent-status-text.busy { color: var(--warning); }
    .agent-status-text.offline { color: var(--muted2); }

    /* -- Quick actions -- */
    .quick-actions {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .quick-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 0.75rem;
      text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .quick-btn:hover { border-color: rgba(255,209,101,0.25); transform: translateY(-2px); }
    .quick-btn-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }
    .quick-btn-label { font-size: 0.8rem; font-weight: 600; }
    .quick-btn-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }

    /* -- Downloads list -- */
    .dl-row {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .dl-row:last-child { border-bottom: none; }
    .dl-icon { font-size: 1.1rem; flex-shrink: 0; }
    .dl-name { flex: 1; font-size: 0.85rem; font-weight: 500; }
    .dl-meta { font-size: 0.75rem; color: var(--muted); }

    /* -- RFQ list -- */
    .rfq-empty {
      text-align: center; padding: 2rem;
      color: var(--muted); font-size: 0.875rem;
    }
    .rfq-empty-icon { font-size: 2rem; margin-bottom: 0.75rem; }

    /* -- Account info -- */
    .account-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .info-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .info-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .info-value { font-size: 0.9rem; font-weight: 500; }

    /* -- Chat handoff modal -- */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--radius-xl); padding: 2rem;
      width: 100%; max-width: 480px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      transform: translateY(20px); transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 0.35rem; }
    .modal-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--muted);
      font-size: 1.1rem; cursor: pointer; transition: color 0.2s;
    }
    .modal-close:hover { color: var(--white); }

    /* -- Team selector in modal -- */
    .team-select-grid { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.25rem; }
    .team-option {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 1rem;
      border: 1px solid var(--border2);
      border-radius: 12px; cursor: pointer; transition: all 0.2s;
    }
    .team-option:hover { border-color: rgba(255,209,101,0.28); background: rgba(255,209,101,0.04); }
    .team-option.selected { border-color: var(--accent); background: rgba(255,209,101,0.07); }
    .team-option input[type="radio"] { display: none; }
    .team-flag { font-size: 1.5rem; flex-shrink: 0; }
    .team-info { flex: 1; }
    .team-name { font-weight: 700; font-size: 0.9rem; }
    .team-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .team-agents { display: flex; margin-top: 0.35rem; }
    .mini-av {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid var(--card); font-size: 0.6rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; color: #000;
    }
    .mini-av:not(:first-child) { margin-left: -6px; }
    .team-online { font-size: 0.72rem; color: var(--success); font-weight: 600; margin-left: 0.5rem; display: flex; align-items: center; gap: 0.3rem; }

    .topic-select { margin-bottom: 1.25rem; }
    .topic-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .topic-chip {
      padding: 0.3rem 0.75rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 99px; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.18s; color: var(--muted);
    }
    .topic-chip:hover { border-color: rgba(255,209,101,0.28); color: var(--text); }
    .topic-chip.selected { background: rgba(255,209,101,0.1); border-color: var(--accent); color: var(--accent); }

    .msg-preview {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 9px; padding: 0.75rem;
      font-size: 0.85rem; line-height: 1.6;
      color: var(--muted); margin-bottom: 1.25rem;
    }

    /* -- Chat widget (dashboard version) -- */
    .chat-widget {
      position: fixed; bottom: 1.75rem; right: 1.75rem; z-index: 2000;
      display: flex; flex-direction: column; align-items: flex-end; gap: 0.65rem;
    }
    .chat-panel {
      width: 360px;
      background: var(--card);
      border: 1px solid rgba(255,209,101,0.18);
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: none; flex-direction: column;
    }
    .chat-panel.open { display: flex; }
    .chat-panel-hdr {
      background: linear-gradient(135deg, rgba(255,209,101,0.1), rgba(255,209,101,0.04));
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .chat-agent-info { flex: 1; }
    .chat-agent-name { font-weight: 700; font-size: 0.875rem; }
    .chat-agent-status { font-size: 0.72rem; color: var(--success); display: flex; align-items: center; gap: 0.3rem; }
    .chat-hdr-actions { display: flex; gap: 0.35rem; }
    .chat-hdr-btn {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 7px; padding: 0.3rem 0.55rem;
      font-size: 0.72rem; cursor: pointer; color: var(--muted);
      transition: all 0.2s;
    }
    .chat-hdr-btn:hover { color: var(--text); border-color: var(--border2); }
    .chat-hdr-btn.transfer { color: var(--accent); border-color: rgba(255,209,101,0.25); }
    .chat-messages-area {
      flex: 1; max-height: 320px; overflow-y: auto;
      padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    .cm { max-width: 85%; }
    .cm-agent {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
      padding: 0.6rem 0.85rem; font-size: 0.83rem; line-height: 1.5;
    }
    .cm-user {
      align-self: flex-end;
      background: rgba(255,209,101,0.1);
      border: 1px solid rgba(255,209,101,0.18);
      border-radius: 12px 4px 12px 12px;
      padding: 0.6rem 0.85rem; font-size: 0.83rem; line-height: 1.5;
    }
    .cm-system {
      align-self: center;
      background: rgba(255,255,255,0.03);
      border: 1px dashed var(--border2);
      border-radius: 8px;
      padding: 0.45rem 0.85rem; font-size: 0.75rem;
      color: var(--muted); text-align: center;
    }
    .cm-name { font-size: 0.68rem; color: var(--accent); font-weight: 600; margin-bottom: 0.2rem; }
    .typing-dots {
      display: flex; gap: 3px; align-items: center;
      padding: 0.6rem 0.85rem;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px; width: fit-content;
    }
    .td { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: tdot 1.2s infinite; }
    .td:nth-child(2) { animation-delay: 0.2s; }
    .td:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100%{opacity:0.2;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }
    .chat-input-row {
      padding: 0.65rem 0.85rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.5rem; align-items: center;
    }
    .chat-inp {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2); border-radius: 8px;
      padding: 0.5rem 0.75rem; font-size: 0.83rem; color: var(--text);
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .chat-inp:focus { border-color: rgba(255,209,101,0.28); }
    .chat-inp::placeholder { color: var(--muted2); }
    .chat-send-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accent); border: none; color: #000;
      font-size: 0.85rem; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }
    .chat-send-btn:hover { background: #f7be1d; }
    .chat-fab {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); border: none; color: #000; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 18px rgba(255,209,101,0.35);
      transition: all 0.2s; position: relative;
    }
    .chat-fab:hover { transform: scale(1.08); }
    .chat-fab-badge {
      position: absolute; top: -2px; right: -2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--danger); border: 2px solid var(--bg);
      font-size: 0.6rem; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center;
    }

    /* -- Responsive -- */
    @media (max-width: 1100px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .two-col { grid-template-columns: 1fr; } }
    @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2,1fr); } .quick-actions { grid-template-columns: repeat(2,1fr); } .account-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -240px; z-index: 900; height: 100vh; top: var(--nav-h); transition: left 0.3s; }
      .sidebar.open { left: 0; }
      .dash-main { padding: 1.25rem; }
    }
  </style>
