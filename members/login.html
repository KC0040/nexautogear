<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — NEXAutogear B2B Portal</title>
  <meta name="description" content="Sign in to your NEXAutogear B2B account to access wholesale pricing, product catalogs, and order management." />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/base.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .login-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: calc(var(--nav-h) + 2rem) 1.5rem 3rem;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(0,100,180,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(173,221,255,0.05) 0%, transparent 60%),
        var(--bg);
    }
    .login-grid-bg {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,209,101,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,209,101,0.03) 1px, transparent 1px);
      background-size: 56px 56px;
      z-index: 0;
    }

    .login-card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius-xl);
      padding: 2.25rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      position: relative; z-index: 1;
    }
    .login-logo {
      font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 900;
      margin-bottom: 1.75rem; text-align: center;
    }
    .login-logo span { color: var(--accent); }
    .login-logo-sub { font-size: 0.72rem; color: var(--muted); font-family: 'Inter',sans-serif; font-weight: 400; letter-spacing: 0.05em; }
    .login-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.25rem; }
    .login-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.75rem; }
    .login-sub a { color: var(--accent); }

    .login-form { display: flex; flex-direction: column; gap: 1rem; }

    .input-icon-wrap { position: relative; }
    .input-icon-wrap .form-input { padding-left: 2.4rem; }
    .input-icon {
      position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
      font-size: 0.95rem; color: var(--muted); pointer-events: none;
    }
    .pw-toggle {
      position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.85rem; padding: 0; transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--text); }

    .login-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; margin-top: 0.25rem;
    }
    .login-footer a { color: var(--accent); }
    .remember { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.8rem; }
    .remember input { accent-color: var(--accent); }

    .login-divider { display: flex; align-items: center; gap: 0.75rem; font-size: 0.78rem; color: var(--muted); margin: 0.5rem 0; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .alt-logins { display: flex; gap: 0.5rem; }
    .alt-login-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.55rem; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border2); border-radius: 9px;
      font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .alt-login-btn:hover { background: rgba(255,255,255,0.07); }

    .login-register-cta {
      margin-top: 1.5rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center; font-size: 0.85rem; color: var(--muted);
    }
    .login-register-cta a { color: var(--accent); font-weight: 600; }

    /* Status banner */
    .status-banner {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(46,213,115,0.06);
      border: 1px solid rgba(46,213,115,0.15);
      border-radius: 10px; font-size: 0.82rem; margin-bottom: 1.5rem;
    }

    /* Enterprise link */
    .enterprise-note {
      margin-top: 1rem; padding: 0.75rem 1rem;
      background: rgba(173,221,255,0.05); border: 1px solid rgba(173,221,255,0.12);
      border-radius: 10px; font-size: 0.82rem; color: var(--muted); text-align: center;
    }
    .enterprise-note a { color: var(--blue); font-weight: 600; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
