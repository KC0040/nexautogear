<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Customer Application — NEXAutogear B2B</title>
  <meta name="description" content="Apply for a NEXAutogear wholesale account. Submit your business information and trade references to get factory-direct pricing." />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/base.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .form-wrap {
      flex: 1;
      padding: calc(var(--nav-h) + 2.5rem) 1.5rem 4rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header { margin-bottom: 2rem; }
    .page-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent-on); background: var(--accent);
      padding: 0.25rem 0.65rem; border-radius: 4px; margin-bottom: 0.75rem;
    }
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.75rem; font-weight: 900; margin-bottom: 0.35rem;
    }
    .page-sub { font-size: 0.9rem; color: var(--muted); line-height: 1.65; max-width: 620px; }

    /* -- Section cards -- */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .form-section {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .form-section:last-child { border-bottom: none; }
    .form-section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent); margin-bottom: 1.1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .form-section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .field-stack { display: flex; flex-direction: column; gap: 0.85rem; }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.73rem; font-weight: 700; color: var(--text);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .field label .req { color: #ff6b6b; margin-left: 2px; }

    .field input, .field select, .field textarea {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      font-size: 0.875rem; color: var(--text);
      font-family: 'Inter', sans-serif; outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); opacity: 0.6; }
    .field select option { background: var(--bg2); }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

    /* Business type radio grid */
    .btype-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .btype-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      cursor: pointer; font-size: 0.83rem;
      transition: all 0.18s;
    }
    .btype-item:has(input:checked) {
      border-color: var(--accent); background: rgba(255,209,101,0.07);
    }
    .btype-item input { accent-color: var(--accent); }

    /* Trade reference block */
    .tref-block {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem; margin-bottom: 0.75rem;
    }
    .tref-num {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 700;
      color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.65rem;
    }

    /* Product interest checks */
    .check-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 0.25rem; }
    .check-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      cursor: pointer; font-size: 0.83rem;
      transition: all 0.18s;
    }
    .check-item:has(input:checked) {
      border-color: var(--accent); background: rgba(255,209,101,0.06);
    }
    .check-item input { accent-color: var(--accent); }

    /* Sub-spec panels */
    .spec-panel {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem; margin-top: 0.75rem;
    }
    .spec-panel-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent); margin-bottom: 0.75rem;
    }
    .spec-panel.blue { border-color: rgba(173,221,255,0.15); }
    .spec-panel.blue .spec-panel-title { color: var(--blue); }

    /* Legal block */
    .legal-block {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem; margin-bottom: 1rem;
      font-size: 0.8rem; color: var(--muted); line-height: 1.65;
    }

    /* Signature row */
    .sig-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 1rem; }
    .sig-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .sig-line {
      border: none; border-bottom: 1px solid var(--border2);
      height: 44px; background: transparent; width: 100%;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem;
      padding: 0 0.25rem;
    }
    .sig-line:focus { outline: none; border-bottom-color: var(--accent); }
    .sig-label-text {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    }

    /* Resale certificate card */
    .resale-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--radius-xl); overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .resale-header {
      padding: 1rem 1.5rem; background: rgba(173,221,255,0.04);
      border-bottom: 1px solid var(--border);
    }
    .resale-header-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700;
      color: var(--blue); margin-bottom: 0.2rem;
    }
    .resale-header-sub { font-size: 0.8rem; color: var(--muted); }

    /* Form actions */
    .form-actions {
      display: flex; gap: 0.75rem; justify-content: flex-end;
      padding: 1.5rem 0; margin-top: 0.5rem;
    }

    /* -- PRINT / PDF MODE -- */
    @media print {
      @page { size: A4; margin: 16mm 14mm 16mm 14mm; }
      body { background: #fff !important; color: #111 !important; padding: 0; font-size: 10pt; }
      .nav, .nav-actions, .support-fab, .form-actions, .toast-wrap { display: none !important; }
      .form-wrap { padding: 0 !important; max-width: 100%; }

      .print-header { display: flex !important; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; border-bottom: 2px solid #111; padding-bottom: 0.75rem; }
      .print-logo { font-family: 'Space Grotesk', sans-serif; font-size: 14pt; font-weight: 900; color: #000; }
      .print-contact { font-size: 8pt; color: #555; text-align: right; line-height: 1.5; }
      .page-header { margin-bottom: 1rem; }
      .page-badge { background: #111 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .page-title { color: #000 !important; font-size: 14pt; }
      .page-sub { color: #555 !important; }

      .form-card, .resale-card {
        background: #fff !important; border: 1px solid #ccc !important;
        border-radius: 0 !important; box-shadow: none; margin-bottom: 8pt;
        break-inside: avoid;
      }
      .form-section { border-bottom: 1px solid #ddd !important; }
      .form-section-title { color: #333 !important; }
      .form-section-title::after { background: #ddd !important; }

      .field label, .sig-label-text { color: #333 !important; }
      .field input, .field select, .field textarea, .sig-line {
        background: #fff !important; border: none !important;
        border-bottom: 1px solid #999 !important; border-radius: 0 !important;
        padding: 3px 2px !important; color: #000 !important; font-size: 10pt;
      }
      .field select { -webkit-appearance: none; }
      .btype-item, .check-item {
        border: 1px solid #ccc !important; background: #fff !important; color: #222 !important;
        -webkit-print-color-adjust: exact;
      }
      .tref-block, .spec-panel, .legal-block {
        background: #f8f8f8 !important; border: 1px solid #ddd !important;
      }
      .spec-panel-title, .tref-num { color: #333 !important; }
      .resale-header { background: #f0f4ff !important; }
      .resale-header-title { color: #1a3a6b !important; }

      .print-footer {
        display: block !important; margin-top: 1rem; font-size: 8pt; color: #888;
        text-align: center; border-top: 1px solid #ddd; padding-top: 0.4rem;
      }
    }
    .print-header { display: none; }
    .print-footer { display: none; }

    @media (max-width: 640px) {
      .field-grid-2, .field-grid-3 { grid-template-columns: 1fr; }
      .sig-area { grid-template-columns: 1fr; }
      .check-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>

</html>
