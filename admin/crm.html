<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM — NEXAutogear Sales</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/base.css" />
  <style>
    body { background: var(--bg); }

    /* ── CRM Layout ── */
    .crm-wrap {
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── Left: Customer List ── */
    .crm-list {
      width: 320px; flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: calc(100vh - var(--nav-h));
      position: sticky; top: var(--nav-h);
      overflow: hidden;
    }
    .crm-list-hdr {
      padding: 1.25rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .crm-list-title {
      font-weight: 800; font-size: 1rem; margin-bottom: 0.75rem;
    }
    .crm-search {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      font-size: 0.83rem; color: var(--text); font-family: inherit;
      outline: none; width: 100%; transition: border-color 0.2s;
    }
    .crm-search:focus { border-color: var(--accent); }
    .crm-search::placeholder { color: var(--muted2); }
    .crm-filter-row {
      display: flex; gap: 0.4rem; padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .crm-filter {
      padding: 0.25rem 0.7rem;
      border-radius: 99px; font-size: 0.75rem; font-weight: 600;
      border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      background: none;
    }
    .crm-filter.active { border-color: var(--accent); color: var(--accent); background: rgba(255,209,101,0.08); }
    .crm-scroll { flex: 1; overflow-y: auto; }
    .customer-item {
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
      display: flex; flex-direction: column; gap: 0.35rem;
    }
    .customer-item:hover { background: rgba(255,255,255,0.03); }
    .customer-item.active { background: rgba(255,209,101,0.07); border-left: 3px solid var(--accent); }
    .ci-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .ci-name { font-weight: 700; font-size: 0.875rem; }
    .ci-tag {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      padding: 0.15rem 0.5rem; border-radius: 4px; flex-shrink: 0;
    }
    .tag-hot    { background: rgba(255,71,87,0.15);   color: var(--danger); }
    .tag-warm   { background: rgba(255,165,2,0.15);   color: var(--warning); }
    .tag-cold   { background: rgba(138,148,166,0.15); color: var(--muted); }
    .tag-active { background: rgba(46,213,115,0.15);  color: var(--success); }
    .ci-company { font-size: 0.78rem; color: var(--muted); }
    .ci-bottom { display: flex; align-items: center; justify-content: space-between; }
    .ci-last { font-size: 0.73rem; color: var(--muted2); }
    .ci-assigned {
      font-size: 0.72rem; font-weight: 600;
      padding: 0.15rem 0.5rem; border-radius: 4px;
      background: rgba(255,255,255,0.05); color: var(--muted);
    }
    .ci-assigned.kaizen { color: #60b4ff; background: rgba(96,180,255,0.1); }
    .ci-assigned.wei    { color: #ff8085; background: rgba(255,71,87,0.1); }
    .ci-assigned.linda  { color: #ffc060; background: rgba(255,165,2,0.1); }

    /* ── Right: Customer Detail ── */
    .crm-detail {
      flex: 1; overflow-y: auto;
      padding: 1.75rem 2rem;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .crm-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.875rem; text-align: center;
    }

    /* ── Detail header ── */
    .detail-hdr {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
    }
    .detail-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 900; margin-bottom: 0.25rem; }
    .detail-meta { font-size: 0.85rem; color: var(--muted); }
    .detail-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    /* ── Info grid ── */
    .info-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
    }
    .info-cell {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.9rem 1rem;
    }
    .info-cell-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .info-cell-value { font-size: 0.9rem; font-weight: 600; }
    .info-cell-value.accent { color: var(--accent); }
    .info-cell-value.success { color: var(--success); }
    .info-cell-value.warning { color: var(--warning); }

    /* ── Sections ── */
    .detail-section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .ds-hdr {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ds-title { font-weight: 700; font-size: 0.875rem; letter-spacing: 0.02em; }
    .ds-body { padding: 1rem 1.25rem; }

    /* ── Contact info ── */
    .contact-row {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-label { width: 110px; flex-shrink: 0; color: var(--muted); font-size: 0.78rem; }
    .contact-value { font-weight: 500; }
    .contact-value a { color: var(--accent); }

    /* ── Activity log ── */
    .activity-list { display: flex; flex-direction: column; gap: 0; }
    .activity-item {
      display: flex; gap: 0.85rem; padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
    }
    .dot-blue   { background: var(--accent); }
    .dot-green  { background: var(--success); }
    .dot-orange { background: var(--warning); }
    .dot-gray   { background: var(--muted); }
    .dot-purple { background: var(--blue); }
    .activity-body { flex: 1; }
    .activity-text { font-size: 0.85rem; line-height: 1.5; }
    .activity-meta { font-size: 0.73rem; color: var(--muted); margin-top: 0.2rem; }
    .activity-agent {
      font-size: 0.72rem; font-weight: 700;
      padding: 0.1rem 0.45rem; border-radius: 4px; margin-left: 0.35rem;
    }
    .by-kaizen { background: rgba(96,180,255,0.12); color: #60b4ff; }
    .by-wei    { background: rgba(255,71,87,0.12);  color: #ff8085; }
    .by-linda  { background: rgba(255,165,2,0.12);  color: #ffc060; }
    .by-bot    { background: rgba(255,255,255,0.06); color: var(--muted); }

    /* ── Notes / AI summary ── */
    .ai-summary {
      background: rgba(255,209,101,0.04);
      border: 1px solid rgba(255,209,101,0.12);
      border-radius: var(--radius); padding: 1rem;
      font-size: 0.85rem; line-height: 1.65; color: var(--text);
    }
    .ai-summary-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.5rem;
    }

    .note-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border2); border-radius: 9px;
      padding: 0.65rem 0.85rem; font-size: 0.85rem;
      color: var(--text); font-family: inherit; outline: none;
      width: 100%; resize: vertical; min-height: 72px;
      transition: border-color 0.2s;
    }
    .note-input:focus { border-color: var(--accent); }
    .note-input::placeholder { color: var(--muted2); }

    /* ── Pipeline stage ── */
    .pipeline {
      display: flex; gap: 0; overflow: hidden;
      border-radius: var(--radius); border: 1px solid var(--border);
    }
    .pipe-stage {
      flex: 1; padding: 0.55rem 0.5rem;
      text-align: center; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); border-right: 1px solid var(--border);
      transition: all 0.2s; cursor: pointer;
    }
    .pipe-stage:last-child { border-right: none; }
    .pipe-stage:hover { background: rgba(255,255,255,0.04); }
    .pipe-stage.current { background: rgba(255,209,101,0.12); color: var(--accent); }
    .pipe-stage.done    { background: rgba(46,213,115,0.08); color: var(--success); }

    /* ── Assign select ── */
    .assign-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0; flex-wrap: wrap;
    }
    .assign-label { font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }

    /* ── Nav simplified (no links) ── */
    .crm-nav-title {
      font-size: 0.75rem; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .crm-list { width: 100%; height: auto; position: static; }
      .crm-wrap { flex-direction: column; }
      .info-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

const agents = { kaizen: 'Kaizen', wei: 'Wei', linda: 'Linda' };
const pipelineStages = ['contact','proposal','quote','negotiation','repeat'];
const pipelineLabels = { contact:'Initial Contact', proposal:'Proposal Sent', quote:'Quote Active', negotiation:'Negotiating', repeat:'Repeat Customer' };

let activeCustomer = null;
let currentFilter = 'all';

/* ── Render customer list ── */
function renderList(list) {
  const el = document.getElementById('customerList');
  el.innerHTML = list.map(c => `
    <div class="customer-item${activeCustomer?.id === c.id ? ' active' : ''}"
         onclick="openCustomer(${c.id})" data-tag="${c.tag}">
      <div class="ci-top">
        <div class="ci-name">${c.name}</div>
        <div class="ci-tag tag-${c.tag}">${c.tag.toUpperCase()}</div>
      </div>
      <div class="ci-company">${c.company} · ${c.location.split('—')[1]?.trim() || c.location}</div>
      <div class="ci-bottom">
        <div class="ci-last">${c.lastContact}</div>
        <div class="ci-assigned ${c.assigned}">${agents[c.assigned]}</div>
      </div>
    </div>
  `).join('');
}
renderList(customers);

function filterCustomers(q) {
  const lq = q.toLowerCase();
  const filtered = customers.filter(c =>
    (c.name+c.company+c.email).toLowerCase().includes(lq) &&
    (currentFilter === 'all' || c.tag === currentFilter)
  );
  renderList(filtered);
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.crm-filter').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterCustomers('');
}

/* ── Open customer detail ── */
function openCustomer(id) {
  activeCustomer = customers.find(c => c.id === id);
  renderList(customers.filter(c => currentFilter === 'all' || c.tag === currentFilter));
  document.getElementById('emptyState').style.display = 'none';

  const c = activeCustomer;
  const stageIdx = pipelineStages.indexOf(c.pipeline);

  const detail = document.getElementById('crmDetail');
  detail.innerHTML = `
    <div>
      <!-- Header -->
      <div class="detail-hdr">
        <div>
          <div class="detail-name">${c.company}</div>
          <div class="detail-meta">${c.name} · ${c.type} · ${c.location}</div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-outline btn-sm" onclick="showToast('Opening email draft…','info')">Email</button>
          <button class="btn btn-outline btn-sm" onclick="showToast('Opening WhatsApp…','info')">WhatsApp</button>
          <button class="btn btn-primary btn-sm" onclick="openChat('${c.name}','${c.assigned}')">Chat Now</button>
        </div>
      </div>

      <!-- Pipeline -->
      <div class="pipeline" style="margin:1.25rem 0 0;">
        ${pipelineStages.map((s,i) => `
          <div class="pipe-stage ${i < stageIdx ? 'done' : i === stageIdx ? 'current' : ''}"
               onclick="updatePipeline(${id},'${s}')">
            ${pipelineLabels[s]}
          </div>`).join('')}
      </div>

      <!-- Stats -->
      <div class="info-grid" style="margin-top:1.25rem;">
        <div class="info-cell">
          <div class="info-cell-label">Total Spent</div>
          <div class="info-cell-value accent">${c.totalSpent}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Est. Monthly Budget</div>
          <div class="info-cell-value">${c.budget}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Primary Market</div>
          <div class="info-cell-value">${c.market}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Products Interest</div>
          <div class="info-cell-value">${c.products.join(' · ')}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Language</div>
          <div class="info-cell-value">${c.lang}</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Last Contact</div>
          <div class="info-cell-value ${c.tag === 'cold' ? 'warning' : 'success'}">${c.lastContact}</div>
        </div>
      </div>
    </div>

    <!-- AI Summary -->
    <div class="detail-section">
      <div class="ds-hdr">
        <div class="ds-title">AI Account Summary</div>
        <div style="font-size:0.72rem;color:var(--accent);font-weight:600;">Updated automatically</div>
      </div>
      <div class="ds-body">
        <div class="ai-summary">
          <div class="ai-summary-label">Agent Context</div>
          ${c.aiSummary}
        </div>
      </div>
    </div>

    <!-- Contact Info -->
    <div class="detail-section">
      <div class="ds-hdr">
        <div class="ds-title">Contact Information</div>
        <div class="assign-row" style="padding:0;gap:0.5rem;">
          <span class="assign-label">Assigned:</span>
          <select class="form-select btn-sm" style="width:auto;padding:0.25rem 0.6rem;font-size:0.8rem;" onchange="reassign(${id},this.value)">
            <option value="kaizen" ${c.assigned==='kaizen'?'selected':''}>Kaizen (TW)</option>
            <option value="wei"    ${c.assigned==='wei'   ?'selected':''}>Wei (CN)</option>
            <option value="linda"  ${c.assigned==='linda' ?'selected':''}>Linda (CN)</option>
          </select>
        </div>
      </div>
      <div class="ds-body">
        <div class="contact-row"><span class="contact-label">Email</span><span class="contact-value"><a href="mailto:${c.email}">${c.email}</a></span></div>
        <div class="contact-row"><span class="contact-label">Phone</span><span class="contact-value">${c.phone}</span></div>
        <div class="contact-row"><span class="contact-label">WhatsApp</span><span class="contact-value">${c.whatsapp || '—'}</span></div>
        <div class="contact-row"><span class="contact-label">Language</span><span class="contact-value">${c.lang}</span></div>
        <div class="contact-row"><span class="contact-label">Business Type</span><span class="contact-value">${c.type}</span></div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="detail-section">
      <div class="ds-hdr">
        <div class="ds-title">Activity Log</div>
        <button class="btn btn-ghost btn-sm" onclick="showToast('Full history loading…','info')">View all</button>
      </div>
      <div class="ds-body">
        <div class="activity-list">
          ${c.activity.map(a => `
            <div class="activity-item">
              <div class="activity-dot dot-${a.type}"></div>
              <div class="activity-body">
                <div class="activity-text">
                  ${a.text}
                  ${a.by !== 'customer' ? `<span class="activity-agent by-${a.by}">${a.by === 'bot' ? 'Support Bot' : agents[a.by]}</span>` : ''}
                </div>
                <div class="activity-meta">${a.time}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="detail-section">
      <div class="ds-hdr"><div class="ds-title">Sales Notes</div></div>
      <div class="ds-body" style="display:flex;flex-direction:column;gap:0.65rem;">
        <textarea class="note-input" placeholder="Add a note visible to all agents and AI…"></textarea>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn btn-primary btn-sm" onclick="showToast('Note saved','success')">Save Note</button>
        </div>
      </div>
    </div>
  `;
}

function updatePipeline(id, stage) {
  const c = customers.find(x => x.id === id);
  if (c) { c.pipeline = stage; openCustomer(id); showToast('Pipeline updated: ' + pipelineLabels[stage], 'success'); }
}

function reassign(id, agent) {
  const c = customers.find(x => x.id === id);
  if (c) { c.assigned = agent; showToast('Reassigned to ' + agents[agent], 'success'); renderList(customers); }
}

function openChat(name, agent) {
  showToast('Opening sales chat with ' + agents[agent] + ' re: ' + name + '…', 'info');
}

function showToast(msg, type = 'info') {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success:'✓', error:'✕', info:'→' };
  t.innerHTML = `<span style="font-weight:700;">${icons[type]}</span><span class="toast-text">${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
