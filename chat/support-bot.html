<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Center — NEXAutogear Members</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/base.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .support-layout {
      display: flex; flex: 1; overflow: hidden;
      padding-top: var(--nav-h);
    }

    /* -- Left sidebar: member context -- */
    .context-panel {
      width: 260px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 1.5rem 1.25rem;
    }

    .member-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 0.85rem; margin-bottom: 1.25rem;
    }
    .member-id-label {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.25rem;
    }
    .member-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.1rem; }
    .member-tier {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      background: rgba(255,209,101,0.12); color: var(--accent); border: 1px solid rgba(255,209,101,0.2);
      padding: 0.15rem 0.45rem; border-radius: 4px; margin-top: 0.35rem;
    }

    .panel-section-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
      margin-bottom: 0.65rem;
    }
    .panel-divider { height: 1px; background: var(--border); margin: 1rem 0; }

    /* Recent orders mini-list */
    .order-mini-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .order-mini-item {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.65rem;
      cursor: pointer; transition: border-color 0.18s;
    }
    .order-mini-item:hover { border-color: var(--accent); }
    .order-mini-id {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; font-weight: 700;
      color: var(--accent); margin-bottom: 0.15rem;
    }
    .order-mini-desc { font-size: 0.75rem; color: var(--muted); }
    .order-mini-status { font-size: 0.7rem; margin-top: 0.15rem; }
    .status-shipped { color: #2ed573; }
    .status-processing { color: var(--blue); }
    .status-transit { color: var(--accent); }

    /* KB topic list */
    .kb-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .kb-item {
      padding: 0.4rem 0.6rem; border-radius: 7px;
      font-size: 0.8rem; cursor: pointer;
      transition: background 0.15s;
    }
    .kb-item:hover { background: var(--card); color: var(--accent); }

    /* -- Main chat -- */
    .chat-main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .chat-header {
      padding: 1rem 1.5rem; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .chat-header-info { display: flex; align-items: center; gap: 0.75rem; }
    .support-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, rgba(173,221,255,0.4) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 900;
      color: var(--bg);
    }
    .chat-header-name { font-weight: 700; font-size: 0.9rem; }
    .chat-header-status { font-size: 0.75rem; color: #2ed573; }

    /* Tabs */
    .support-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
    }
    .s-tab {
      padding: 0.65rem 1.25rem; font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
      transition: all 0.18s; white-space: nowrap;
    }
    .s-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .s-tab:hover:not(.active) { color: var(--text); }

    /* Chat messages */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg-row { display: flex; gap: 0.65rem; align-items: flex-end; max-width: 82%; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, var(--blue) 0%, rgba(173,221,255,0.3) 100%); color: var(--bg); }
    .msg-avatar.user { background: var(--card2); color: var(--muted); }
    .msg-content { display: flex; flex-direction: column; gap: 0.2rem; }
    .msg-bubble {
      padding: 0.65rem 0.9rem; border-radius: 14px;
      font-size: 0.875rem; line-height: 1.6; max-width: 480px;
    }
    .msg-row.bot .msg-bubble {
      background: var(--card); border: 1px solid var(--border2); border-bottom-left-radius: 4px;
    }
    .msg-row.user .msg-bubble {
      background: var(--blue); color: var(--bg);
      border-bottom-right-radius: 4px; font-weight: 500;
    }
    .msg-time { font-size: 0.7rem; color: var(--muted); padding: 0 0.25rem; }
    .msg-row.user .msg-content { align-items: flex-end; }

    /* Info card in chat */
    .chat-info-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 0.85rem; margin-top: 0.5rem;
      max-width: 360px;
    }
    .chat-info-card-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--blue); margin-bottom: 0.5rem;
    }
    .chat-info-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    .chat-info-row:last-child { border-bottom: none; }
    .chat-info-key { color: var(--muted); }
    .chat-info-val { font-weight: 600; }

    /* Typing */
    .typing-dots { display: flex; gap: 4px; padding: 0.65rem 0.9rem; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* Quick replies */
    .quick-replies { display: flex; gap: 0.4rem; flex-wrap: wrap; padding: 0 1.5rem 0.75rem; }
    .qr-chip {
      padding: 0.4rem 0.75rem; border-radius: 20px;
      border: 1px solid var(--border2); background: var(--card);
      font-size: 0.8rem; cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .qr-chip:hover { border-color: var(--blue); color: var(--blue); }

    /* Input */
    .chat-input-bar {
      padding: 1rem 1.5rem; background: var(--bg2);
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-input-wrap {
      display: flex; gap: 0.5rem; align-items: flex-end;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 12px; padding: 0.5rem 0.5rem 0.5rem 1rem;
      transition: border-color 0.2s;
    }
    .chat-input-wrap:focus-within { border-color: var(--blue); }
    .chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem;
      resize: none; min-height: 22px; max-height: 120px; line-height: 1.5; padding: 0.15rem 0;
    }
    .chat-input::placeholder { color: var(--muted); opacity: 0.7; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--blue); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 900;
      color: var(--bg); transition: opacity 0.18s;
    }
    .send-btn:hover { opacity: 0.85; }
    .input-hint { font-size: 0.73rem; color: var(--muted); text-align: center; margin-top: 0.5rem; }

    /* Access gate */
    .access-gate {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1.25rem; text-align: center; padding: 2rem;
    }
    .gate-icon {
      font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 900;
      color: var(--muted);
    }
    .gate-title { font-size: 1.25rem; font-weight: 800; }
    .gate-sub { font-size: 0.9rem; color: var(--muted); max-width: 340px; line-height: 1.6; }

    /* Members-only disclaimer */
    .members-notice {
      background: rgba(173,221,255,0.05); border: 1px solid rgba(173,221,255,0.12);
      border-radius: var(--radius); padding: 0.65rem 1rem;
      font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .context-panel { display: none; }
    }
  </style>
