<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Assistant — NEXAutogear</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/base.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-layout {
      display: flex; flex: 1; overflow: hidden;
      padding-top: var(--nav-h);
    }

    /* -- Left panel: agent profile -- */
    .agent-panel {
      width: 260px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 1.5rem 1.25rem;
    }
    .agent-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #f7be1d 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 900;
      color: var(--accent-on); margin-bottom: 0.75rem;
      position: relative;
    }
    .agent-dot {
      width: 12px; height: 12px; background: #2ed573; border-radius: 50%;
      border: 2px solid var(--bg2);
      position: absolute; bottom: 2px; right: 2px;
    }
    .agent-name {
      font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 800;
      margin-bottom: 0.15rem;
    }
    .agent-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
    .agent-lang {
      display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .lang-chip {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.2rem 0.5rem; border-radius: 4px;
      background: rgba(255,209,101,0.12); color: var(--accent); border: 1px solid rgba(255,209,101,0.2);
    }

    .panel-divider { height: 1px; background: var(--border); margin: 1rem 0; }

    .panel-section-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
      margin-bottom: 0.65rem;
    }
    .capability-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .cap-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      font-size: 0.8rem; color: var(--muted); line-height: 1.45;
    }
    .cap-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      flex-shrink: 0; margin-top: 0.35rem;
    }

    .quick-facts { display: flex; flex-direction: column; gap: 0.35rem; margin-top: 0.75rem; }
    .fact-row { display: flex; justify-content: space-between; font-size: 0.78rem; }
    .fact-key { color: var(--muted); }
    .fact-val { font-weight: 600; }

    /* -- Main chat area -- */
    .chat-main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .chat-header {
      padding: 1rem 1.5rem; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .chat-header-info { display: flex; align-items: center; gap: 0.75rem; }
    .chat-header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #f7be1d 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; font-weight: 900;
      color: var(--accent-on);
    }
    .chat-header-name { font-weight: 700; font-size: 0.9rem; }
    .chat-header-status { font-size: 0.75rem; color: #2ed573; }
    .chat-header-actions { display: flex; gap: 0.5rem; }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }

    /* Message bubbles */
    .msg-row { display: flex; gap: 0.65rem; align-items: flex-end; max-width: 80%; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 700;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, var(--accent) 0%, #f7be1d 100%); color: var(--accent-on); }
    .msg-avatar.user { background: var(--card2); color: var(--muted); }

    .msg-content { display: flex; flex-direction: column; gap: 0.2rem; }
    .msg-bubble {
      padding: 0.65rem 0.9rem; border-radius: 14px;
      font-size: 0.875rem; line-height: 1.6; max-width: 460px;
    }
    .msg-row.bot .msg-bubble {
      background: var(--card); border: 1px solid var(--border2); border-bottom-left-radius: 4px;
    }
    .msg-row.user .msg-bubble {
      background: var(--accent); color: var(--accent-on);
      border-bottom-right-radius: 4px; font-weight: 500;
    }
    .msg-time { font-size: 0.7rem; color: var(--muted); padding: 0 0.25rem; }
    .msg-row.user .msg-content { align-items: flex-end; }

    /* Product suggestion cards in chat */
    .chat-product-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 0.85rem; margin-top: 0.5rem;
      display: flex; align-items: center; gap: 0.85rem; max-width: 340px;
    }
    .chat-product-img {
      width: 52px; height: 52px; background: var(--bg3); border-radius: 8px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700;
      color: var(--muted); text-align: center; line-height: 1.3;
    }
    .chat-product-info { flex: 1; min-width: 0; }
    .chat-product-name { font-weight: 700; font-size: 0.82rem; margin-bottom: 0.15rem; }
    .chat-product-price { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
    .chat-product-moq { font-size: 0.7rem; color: var(--muted); }

    /* Quick reply chips */
    .quick-replies {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      padding: 0 1.5rem 0.75rem;
    }
    .qr-chip {
      padding: 0.4rem 0.75rem; border-radius: 20px;
      border: 1px solid var(--border2); background: var(--card);
      font-size: 0.8rem; cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .qr-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Typing indicator */
    .typing-indicator {
      display: flex; align-items: center; gap: 0.65rem; max-width: 80%;
    }
    .typing-dots { display: flex; gap: 4px; padding: 0.65rem 0.9rem; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* Input bar */
    .chat-input-bar {
      padding: 1rem 1.5rem; background: var(--bg2);
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .chat-input-wrap {
      display: flex; gap: 0.5rem; align-items: flex-end;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 12px; padding: 0.5rem 0.5rem 0.5rem 1rem;
      transition: border-color 0.2s;
    }
    .chat-input-wrap:focus-within { border-color: var(--accent); }
    .chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem;
      resize: none; min-height: 22px; max-height: 120px; line-height: 1.5;
      padding: 0.15rem 0;
    }
    .chat-input::placeholder { color: var(--muted); opacity: 0.7; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.18s;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 900;
      color: var(--accent-on);
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint { font-size: 0.73rem; color: var(--muted); text-align: center; margin-top: 0.5rem; }

    /* Disclaimer banner */
    .bot-disclaimer {
      background: rgba(255,209,101,0.05); border: 1px solid rgba(255,209,101,0.12);
      border-radius: var(--radius); padding: 0.65rem 1rem;
      font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem;
      display: flex; gap: 0.5rem; align-items: flex-start;
    }

    @media (max-width: 768px) {
      .agent-panel { display: none; }
    }
  </style>
